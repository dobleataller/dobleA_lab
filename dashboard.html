<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Management — Dashboard Doble A Lab</title>
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple-deep: #3B0F8C;
      --purple-mid: #6B21C8;
      --purple-light: #8B5CF6;
      --magenta: #E040A0;
      --magenta-bright: #F520A0;
      --dark: #0A0A0A;
      --light-bg: #F0EDE8;
      --text-dark: #111;
      --text-mid: #444;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0d0030;
      color: #fff;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
      background: rgba(20,0,60,.95);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 40px;
      border-bottom: 1px solid rgba(139,92,246,.2);
    }
    nav .logo img { height: 60px; display: block; mix-blend-mode: screen; }
    nav .nav-right { display: flex; align-items: center; gap: 20px; }
    nav .nav-right a { color: rgba(255,255,255,.7); text-decoration: none; font-size: .85rem; }
    nav .nav-right a:hover { color: var(--magenta); }
    #nav-user-email { color: rgba(255,255,255,.5); font-size: .8rem; }
    #nav-logout-btn {
      background: none; border: 1px solid rgba(255,255,255,.25);
      color: rgba(255,255,255,.7); padding: 5px 14px; border-radius: 20px;
      font-size: .8rem; cursor: pointer; font-family: inherit;
      transition: all .2s;
    }
    #nav-logout-btn:hover { border-color: var(--magenta); color: var(--magenta); }

    /* ── MAIN ── */
    main { padding: 120px 40px 80px; max-width: 1100px; margin: 0 auto; }

    /* ── PAGE TITLE ── */
    .page-header { margin-bottom: 40px; }
    .page-header h1 {
      font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 800;
      background: linear-gradient(90deg, #c084fc, var(--magenta));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .page-header p { color: rgba(255,255,255,.55); font-size: .95rem; }
    .page-header .admin-note {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(224,64,160,.14);
      border: 1px solid rgba(224,64,160,.32);
      color: #f9a8d4;
      font-size: .8rem;
      font-weight: 600;
    }

    /* ── STATES ── */
    .state-card {
      background: rgba(255,255,255,.05); border: 1px solid rgba(139,92,246,.25);
      border-radius: 16px; padding: 48px; text-align: center; max-width: 480px; margin: 60px auto;
    }
    .state-card h2 { color: #fff; font-size: 1.2rem; margin-bottom: 12px; }
    .state-card p { color: rgba(255,255,255,.5); font-size: .9rem; line-height: 1.6; }
    .state-card a {
      display: inline-block; margin-top: 20px;
      color: var(--purple-light); font-size: .85rem; text-decoration: underline;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: .72rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--magenta);
      margin-bottom: 18px;
    }

    /* ── MANAGEMENT ── */
    #strategy-section,
    #management-section,
    #team-pulse-section,
    #drive-section { margin-bottom: 42px; }
    .strategy-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .strategy-card {
      background: linear-gradient(145deg, rgba(224,64,160,.12), rgba(59,15,140,.24));
      border: 1px solid rgba(224,64,160,.26);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 22px 55px rgba(5, 0, 20, .14);
    }
    .strategy-card h3 {
      color: #fff;
      font-size: 1.02rem;
      margin-bottom: 10px;
    }
    .strategy-card p {
      color: rgba(255,255,255,.68);
      font-size: .88rem;
      line-height: 1.6;
    }
    .management-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .management-card,
    .pulse-card {
      background: linear-gradient(160deg, rgba(59,15,140,.22), rgba(13,0,48,.82));
      border: 1px solid rgba(139,92,246,.3);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 22px 55px rgba(5, 0, 20, .18);
    }
    .management-card.wide { grid-column: span 2; }
    .card-kicker {
      color: rgba(255,255,255,.45);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .management-card h3,
    .pulse-card h3 {
      color: #fff;
      font-size: 1.02rem;
      margin-bottom: 14px;
    }
    .management-card p,
    .pulse-card p {
      color: rgba(255,255,255,.62);
      font-size: .88rem;
      line-height: 1.55;
    }
    .todo-list {
      list-style: none;
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .todo-list li {
      position: relative;
      padding-left: 18px;
      color: rgba(255,255,255,.84);
      font-size: .9rem;
      line-height: 1.5;
    }
    .todo-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: .6em;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(90deg, #c084fc, var(--magenta));
      box-shadow: 0 0 0 4px rgba(224,64,160,.12);
    }
    .task-owner {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      padding: 2px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      color: #e9d5ff;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
      vertical-align: middle;
    }
    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .quick-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      font-size: .82rem;
      font-weight: 600;
      transition: transform .2s, border-color .2s, background .2s;
    }
    .quick-link:hover {
      transform: translateY(-1px);
      border-color: rgba(224,64,160,.45);
      background: rgba(224,64,160,.14);
    }
    .inline-note {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.64);
      font-size: .82rem;
      line-height: 1.5;
    }
    .management-task-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    .task-item {
      padding: 16px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      display: grid;
      gap: 12px;
    }
    .task-item.is-done {
      background: rgba(34,197,94,.1);
      border-color: rgba(34,197,94,.35);
    }
    .task-topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .task-copy {
      min-width: 0;
      display: grid;
      gap: 8px;
    }
    .task-title {
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      line-height: 1.4;
    }
    .task-detail {
      color: rgba(255,255,255,.58);
      font-size: .82rem;
      line-height: 1.5;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .task-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.72);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .task-chip.done {
      background: rgba(34,197,94,.18);
      border-color: rgba(34,197,94,.3);
      color: #bbf7d0;
    }
    .task-chip.pending {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.1);
      color: rgba(255,255,255,.72);
    }
    .task-link {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 6px;
      color: #f0abfc;
      text-decoration: none;
      font-size: .8rem;
      font-weight: 600;
    }
    .task-link:hover { color: #fff; }
    .task-status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,.72);
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    .task-check {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,.45);
      background: rgba(255,255,255,.03);
      display: inline-grid;
      place-items: center;
      cursor: pointer;
      margin: 0;
      transition: border-color .2s, background .2s, transform .2s;
    }
    .task-check:hover {
      border-color: rgba(224,64,160,.6);
      transform: translateY(-1px);
    }
    .task-check:checked {
      background: rgba(34,197,94,.18);
      border-color: rgba(34,197,94,.5);
    }
    .task-check::after {
      content: '';
      width: 9px;
      height: 5px;
      border-left: 2px solid transparent;
      border-bottom: 2px solid transparent;
      transform: rotate(-45deg) scale(0);
      transform-origin: center;
      transition: transform .14s ease;
      margin-top: -1px;
    }
    .task-check:checked::after {
      border-left-color: #bbf7d0;
      border-bottom-color: #bbf7d0;
      transform: rotate(-45deg) scale(1);
    }
    .task-check:disabled {
      cursor: not-allowed;
      opacity: .85;
    }
    .task-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .followup-contacts {
      display: grid;
      gap: 8px;
      margin-top: 4px;
      padding-top: 4px;
    }
    .followup-contact {
      display: grid;
      gap: 2px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
    }
    .followup-contact-name {
      color: #fff;
      font-size: .82rem;
      font-weight: 700;
      line-height: 1.35;
    }
    .followup-contact-email {
      color: rgba(255,255,255,.56);
      font-size: .76rem;
      line-height: 1.35;
      word-break: break-word;
    }
    .task-btn,
    .secondary-btn {
      border-radius: 999px;
      padding: 8px 12px;
      font-size: .76rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .2s, border-color .2s, background .2s;
    }
    .task-btn {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
      color: #fff;
    }
    .task-btn:hover { border-color: rgba(224,64,160,.4); background: rgba(224,64,160,.12); }
    .task-btn.danger:hover { border-color: rgba(248,113,113,.45); background: rgba(248,113,113,.12); }
    .secondary-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.72);
    }
    .secondary-btn:hover { border-color: rgba(255,255,255,.32); color: #fff; }
    .task-empty {
      color: rgba(255,255,255,.38);
      font-size: .86rem;
      padding: 12px 0 2px;
    }
    .management-alert {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(139,92,246,.26);
      background: rgba(59,15,140,.16);
      color: rgba(255,255,255,.72);
      font-size: .82rem;
      line-height: 1.5;
    }
    .management-alert.error {
      border-color: rgba(248,113,113,.3);
      background: rgba(127,29,29,.18);
      color: #fecaca;
    }
    .editor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .editor-grid .wide { grid-column: span 2; }
    .checkbox-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,.72);
      font-size: .82rem;
      font-weight: 600;
    }
    .checkbox-row input { accent-color: #c026d3; }
    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }
    .editor-actions .admin-btn,
    .editor-actions .secondary-btn {
      width: auto;
      min-width: 150px;
    }
    .editor-status {
      margin-bottom: 16px;
      color: rgba(255,255,255,.55);
      font-size: .82rem;
      line-height: 1.5;
    }
    .pulse-grid {
      display: grid;
      grid-template-columns: minmax(240px, .8fr) minmax(0, 1.2fr);
      gap: 18px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .stat-card {
      border-radius: 16px;
      padding: 18px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(139,92,246,.24);
    }
    .stat-label {
      color: rgba(255,255,255,.45);
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .stat-value {
      color: #fff;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 800;
      line-height: 1;
    }
    .stat-caption {
      margin-top: 10px;
      color: rgba(255,255,255,.55);
      font-size: .82rem;
      line-height: 1.45;
    }
    .paid-users-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    .paid-user {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
    }
    .paid-user-copy { min-width: 0; }
    .paid-user-name {
      color: #fff;
      font-size: .92rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .paid-user-email {
      color: rgba(255,255,255,.48);
      font-size: .8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .paid-user-meta {
      color: #c4b5fd;
      font-size: .75rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .empty-paid {
      color: rgba(255,255,255,.36);
      font-size: .88rem;
      padding: 16px 0 4px;
    }

    /* ── MATERIALS GRID ── */
    #materials-section { margin-bottom: 60px; }
    .materials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }
    .material-card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(139,92,246,.25);
      border-radius: 14px; padding: 22px;
      display: flex; flex-direction: column; gap: 12px;
      transition: border-color .2s, background .2s;
    }
    .material-card:hover {
      border-color: rgba(139,92,246,.6);
      background: rgba(139,92,246,.08);
    }
    .material-icon {
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .material-icon.pdf  { background: rgba(224,64,160,.15); }
    .material-icon.video { background: rgba(107,33,200,.2); }
    .material-icon.doc  { background: rgba(59,15,140,.3); }
    .material-icon.other { background: rgba(255,255,255,.08); }
    .material-name { font-size: .95rem; font-weight: 600; color: #fff; line-height: 1.3; }
    .material-desc { font-size: .8rem; color: rgba(255,255,255,.45); line-height: 1.5; flex: 1; }
    .material-date { font-size: .72rem; color: rgba(255,255,255,.3); }
    .material-download {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(90deg, var(--purple-mid), var(--magenta));
      color: #fff; border: none; border-radius: 8px; padding: 8px 16px;
      font-size: .8rem; font-weight: 600; font-family: inherit;
      cursor: pointer; text-decoration: none; transition: opacity .2s;
      width: fit-content;
    }
    .material-download:hover { opacity: .85; }
    .empty-materials {
      text-align: center; padding: 60px 20px;
      color: rgba(255,255,255,.3); font-size: .9rem;
    }

    /* ── ADMIN PANEL ── */
    #admin-section {
      border-top: 1px solid rgba(139,92,246,.2);
      padding-top: 40px; margin-top: 40px;
    }
    .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 700px) { .admin-grid { grid-template-columns: 1fr; } }

    .admin-card {
      background: rgba(59,15,140,.15);
      border: 1px solid rgba(139,92,246,.3);
      border-radius: 14px; padding: 28px;
    }
    .admin-card.wide { grid-column: span 2; }
    .admin-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 18px; color: #c4b5fd; }

    /* Upload form */
    .upload-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .upload-field label { font-size: .78rem; color: rgba(255,255,255,.6); font-weight: 500; }
    .upload-field input, .upload-field textarea, .upload-field select {
      background: rgba(255,255,255,.07); border: 1px solid rgba(139,92,246,.35);
      border-radius: 8px; padding: 9px 12px; color: #fff; font-size: .85rem;
      font-family: inherit; outline: none; transition: border-color .2s;
    }
    .upload-field input:focus, .upload-field textarea:focus, .upload-field select:focus { border-color: var(--purple-light); }
    .upload-field textarea { resize: vertical; min-height: 70px; }
    .upload-field input[type="file"] { padding: 7px 10px; cursor: pointer; }
    .upload-field input[type="file"]::file-selector-button {
      background: rgba(139,92,246,.3); border: none; border-radius: 6px;
      color: #c4b5fd; padding: 4px 10px; font-size: .78rem; cursor: pointer;
      font-family: inherit; margin-right: 10px;
    }
    .admin-btn {
      background: linear-gradient(90deg, var(--purple-mid), var(--magenta));
      border: none; border-radius: 8px; padding: 10px 20px;
      color: #fff; font-size: .85rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity .2s; width: 100%;
    }
    .admin-btn:hover { opacity: .85; }
    .admin-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* Users table */
    .users-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    .users-table th {
      text-align: left; padding: 8px 10px;
      color: rgba(255,255,255,.4); font-weight: 600;
      border-bottom: 1px solid rgba(139,92,246,.2);
    }
    .users-table td { padding: 10px 10px; border-bottom: 1px solid rgba(255,255,255,.05); }
    .users-table tr:last-child td { border-bottom: none; }
    .users-table .email-cell { color: rgba(255,255,255,.75); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .paid-badge {
      display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: .7rem; font-weight: 700;
    }
    .paid-badge.yes { background: rgba(139,92,246,.25); color: #c4b5fd; }
    .paid-badge.no  { background: rgba(255,255,255,.08); color: rgba(255,255,255,.4); }
    .toggle-paid-btn {
      background: none; border: 1px solid rgba(139,92,246,.4); border-radius: 6px;
      color: var(--purple-light); font-size: .72rem; padding: 3px 8px;
      cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .toggle-paid-btn:hover { background: rgba(139,92,246,.2); }

    /* Status messages */
    .msg { border-radius: 8px; padding: 10px 14px; font-size: .82rem; margin-top: 12px; display: none; }
    .msg.error { background: rgba(224,64,160,.15); border: 1px solid rgba(224,64,160,.35); color: #f9a8d4; }
    .msg.success { background: rgba(139,92,246,.15); border: 1px solid rgba(139,92,246,.35); color: #c4b5fd; }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; gap: 14px; color: rgba(255,255,255,.4); font-size: .9rem;
    }

    @media (max-width: 600px) {

  function delay(ms) {
    return new Promise((resolve) => window.setTimeout(resolve, ms));

  function normalizeEmail(value) {
    return String(value || '').trim().toLowerCase();
  }

  function isManagementAdminEmail(email) {
    return MANAGEMENT_ADMIN_EMAILS.has(normalizeEmail(email));

  function readDashboardSessionBridge() {
    try {
      const raw = sessionStorage.getItem(DASHBOARD_SESSION_BRIDGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed?.access_token || !parsed?.refresh_token) return null;
      return parsed;
    } catch (error) {
      console.warn('No se pudo leer el puente de sesión del dashboard.', error);
      return null;
    }
  }

  function clearDashboardSessionBridge() {
    try {
      sessionStorage.removeItem(DASHBOARD_SESSION_BRIDGE_KEY);
    } catch (error) {
      console.warn('No se pudo limpiar el puente de sesión del dashboard.', error);
    }
  }

  async function restoreSessionFromBridge() {
    const bridgedSession = readDashboardSessionBridge();
    if (!bridgedSession) return null;

    const { data, error } = await sb.auth.setSession(bridgedSession);
    if (error) {
      clearDashboardSessionBridge();
      throw error;
    }

    return data?.session || null;
  }

  function sanitizeTask(task, index = 0) {
    const normalizedTitle = String(task?.title || '').trim();
    const normalizedOwner = emptyToNull(task?.owner);
    return {
      id: task?.id ? String(task.id) : `local-task-${Date.now()}-${index}`,
      section_key: task?.section_key || MANAGEMENT_SECTIONS[0].key,
      title: normalizedTitle,
      detail: emptyToNull(task?.detail),
      owner: normalizedOwner === 'Vale / Valentina' ? 'Valentina' : normalizedOwner,
      link_url: emptyToNull(normalizeOptionalUrl(task?.link_url)),
      sort_order: Number(task?.sort_order ?? ((index + 1) * 10)),
      is_done: Boolean(task?.is_done)
    };
  }

  function shouldKeepManagementTask(task) {
    return normalizeEmail(task?.title) !== 'pensar en ptrps';
  }

  function readLocalManagementTasks() {
    try {
      const raw = localStorage.getItem(LOCAL_MANAGEMENT_TASKS_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return null;
      return parsed
        .map((task, index) => sanitizeTask(task, index))
        .filter((task) => shouldKeepManagementTask(task))
        .filter((task) => task.title);
    } catch (error) {
      console.warn('No se pudieron leer las tareas locales del management.', error);
      return null;
    }
  }

  function writeLocalManagementTasks(tasks) {
    try {
      localStorage.setItem(
        LOCAL_MANAGEMENT_TASKS_KEY,
        JSON.stringify(
          tasks
            .map((task, index) => sanitizeTask(task, index))
            .filter((task) => shouldKeepManagementTask(task))
        )
      );
    } catch (error) {
      console.warn('No se pudieron guardar las tareas locales del management.', error);
    }
  }

  function localManagementTasks() {
    const storedTasks = readLocalManagementTasks();
    if (storedTasks && storedTasks.length) return storedTasks;
    const seedTasks = DEFAULT_MANAGEMENT_TASKS
      .map((task, index) => sanitizeTask(task, index))
      .filter((task) => shouldKeepManagementTask(task));
    writeLocalManagementTasks(seedTasks);
    return seedTasks;
  }

  async function waitForSession() {
    for (let attempt = 0; attempt < 8; attempt += 1) {
      const { data: { session }, error } = await sb.auth.getSession();
      if (error) throw error;
      if (session) return session;
      if (attempt === 0) {
        const bridgedSession = await restoreSessionFromBridge();
        if (bridgedSession) return bridgedSession;
      }
      await delay(250 * (attempt + 1));
    }
    return null;
  }

  // ── Init ──────────────────────────────────────────────────────────────
  async function init() {
    if (PREVIEW_MODE) {
      startPreviewMode();
      return;
    }

    if (!sb) {
      showAccessDenied('No se pudo cargar la conexión del dashboard. Intenta de nuevo desde la versión publicada.');
      return;
    }

    try {
      const session = await waitForSession();

      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      currentUser = session.user;
      clearDashboardSessionBridge();
      document.getElementById('nav-user-email').textContent = currentUser.email;
      const emailHasManagementAccess = isManagementAdminEmail(currentUser.email);

      let { data: profile, error } = await sb.from('profiles')
        .select('*')
        .eq('id', currentUser.id)
        .single();

      // Auto-create profile if missing (e.g. user existed before trigger)
      if (error || !profile) {
        const { data: newProfile, error: insertError } = await sb.from('profiles')
          .upsert({
            id: currentUser.id,
            email: currentUser.email,
            full_name: currentUser.user_metadata?.full_name || '',
            is_paid: false,
            is_admin: false
          }, { onConflict: 'id' })
          .select()
          .single();

        if (insertError || !newProfile) {
          showAccessDenied('No se pudo cargar tu perfil. Intenta nuevamente.');
          return;
        }
        profile = newProfile;
      }

      if (emailHasManagementAccess) {
        profile = {
          ...profile,
          is_admin: true
        };
      }

      currentProfile = profile;

      if (!profile.is_paid && !profile.is_admin) {
        showPendingPayment();
        return;
      }

      renderDashboard();
    } catch (err) {
      console.error('Dashboard init error:', err);
      showAccessDenied('No se pudo verificar tu acceso en este momento. Vuelve a iniciar sesión e inténtalo de nuevo.');
    }
  }

      .select('*')
      .order('created_at', { ascending: false });

    const grid = document.getElementById('materials-grid');
    if (!grid) return;
    if (error || !materials || materials.length === 0) {
      grid.innerHTML = '<p class="empty-materials">Aún no hay materiales subidos. Vuelve pronto.</p>';
      return;
    }

    grid.innerHTML = materials.map(m => materialCardHTML(m)).join('');

  function materialCardHTML(m) {
    const iconMap = { pdf: '📄', mp4: '🎬', mov: '🎬', avi: '🎬', docx: '📝', doc: '📝', pptx: '📊', xlsx: '📊' };
    const ext     = (m.file_path || '').split('.').pop().toLowerCase();
    const icon    = iconMap[ext] || '📎';
    const typeClass = ['pdf'].includes(ext) ? 'pdf' : ['mp4','mov','avi'].includes(ext) ? 'video' : ['docx','doc'].includes(ext) ? 'doc' : 'other';
    const date    = new Date(m.created_at).toLocaleDateString('es-CL', { day:'numeric', month:'short', year:'numeric' });

    return `
      <div class="material-card">
        <div class="material-icon ${typeClass}">${icon}</div>
        <div class="material-name">${m.name}</div>
        ${m.description ? `<div class="material-desc">${m.description}</div>` : ''}
        <div class="material-date">${date}</div>
        <button class="material-download" onclick="downloadMaterial('${m.file_path}', '${m.name}')">
          ↓ Descargar
        </button>
      </div>`;
  }

  async function downloadMaterial(filePath, name) {
    const { data, error } = await sb.storage.from('materials').createSignedUrl(filePath, 60);
    if (error) { alert('Error al obtener el archivo.'); return; }
    const a = document.createElement('a');
    a.href = data.signedUrl; a.download = name; a.target = '_blank';

  // ── Admin: Upload ─────────────────────────────────────────────────────
  async function uploadMaterial() {
    const name    = document.getElementById('mat-name').value.trim();
    const desc    = document.getElementById('mat-desc').value.trim();
    const fileEl  = document.getElementById('mat-file');
    const file    = fileEl.files[0];
    const btn     = document.getElementById('upload-btn');
    const msgEl   = document.getElementById('upload-msg');

    if (PREVIEW_MODE) {
      showMsg(msgEl, 'error', 'Vista previa local: la subida de archivos solo funciona en el sitio publicado con sesión.');
      return;
    }

    if (!name || !file) { showMsg(msgEl, 'error', 'Ingresa nombre y archivo.'); return; }

    btn.disabled = true; btn.textContent = 'Subiendo…';
    hideMsg(msgEl);

    const ext      = file.name.split('.').pop();
    const filePath = `${Date.now()}-${name.replace(/\s+/g,'-').toLowerCase()}.${ext}`;

    const { error: storageError } = await sb.storage.from('materials').upload(filePath, file);
    if (storageError) {
      showMsg(msgEl, 'error', 'Error al subir: ' + storageError.message);
      btn.disabled = false; btn.textContent = 'Subir archivo'; return;
    }

    const { error: dbError } = await sb.from('materials').insert({
      name, description: desc || null, file_path: filePath,
      file_type: ext, uploaded_by: currentUser.id
    });

    if (dbError) {
      showMsg(msgEl, 'error', 'Archivo subido pero no se registró: ' + dbError.message);
    } else {
      showMsg(msgEl, 'success', '¡Material subido con éxito!');
      document.getElementById('mat-name').value = '';
      document.getElementById('mat-desc').value = '';
      fileEl.value = '';
      loadMaterials();
    }

    btn.disabled = false; btn.textContent = 'Subir archivo';
  }

  // ── Admin: Users ──────────────────────────────────────────────────────
  async function loadPaidUsers() {
    const list = document.getElementById('paid-users-list');
    const paidCountEl = document.getElementById('paid-count');
    const pendingCountEl = document.getElementById('pending-count');
    if (!list || !paidCountEl || !pendingCountEl) return;

    const manualPaidUsers = PREVIEW_PAID_USERS.slice();
    const manualPaidEmails = new Set(manualPaidUsers.map((user) => normalizeEmail(user.email)));

    if (PREVIEW_MODE) {
      paidUsersCache = manualPaidUsers;
      paidCountEl.textContent = String(manualPaidUsers.length);
      pendingCountEl.textContent = String(PREVIEW_USERS.filter((user) => !user.is_paid).length);
      list.innerHTML = manualPaidUsers.map((user) => paidUserHTML(user)).join('');
      return;
    }

    const { data: users, error } = await sb.from('profiles')
      .select('id, email, full_name, is_paid, is_admin, created_at')
      .order('created_at', { ascending: false });

    if (error || !users) {
      paidUsersCache = manualPaidUsers;
      list.innerHTML = manualPaidUsers.map((user) => paidUserHTML(user)).join('');
      paidCountEl.textContent = String(manualPaidUsers.length);
      pendingCountEl.textContent = String(PREVIEW_USERS.filter((user) => !user.is_paid).length);
      return;
    }

    const paidUsers = manualPaidUsers.map((manualUser) => {
      const dbUser = users.find((user) => normalizeEmail(user.email) === normalizeEmail(manualUser.email));
      return dbUser ? { ...dbUser, ...manualUser, is_paid: true } : manualUser;
    });
    const pendingUsers = users.filter((user) => {
      const isAdmin = user.is_admin || isManagementAdminEmail(user.email);
      return !isAdmin && !user.is_paid && !manualPaidEmails.has(normalizeEmail(user.email));
    });
    paidUsersCache = paidUsers;
    paidCountEl.textContent = String(paidUsers.length);
    pendingCountEl.textContent = String(pendingUsers.length);

    if (paidUsers.length === 0) {
      list.innerHTML = '<p class="empty-paid">Aún no hay pagos confirmados en la base.</p>';
      if (managementTasksCache.length) renderManagementTasks(managementTasksCache, { editable: managementTasksAvailable });
      return;
    }

    list.innerHTML = paidUsers.map((user) => paidUserHTML(user)).join('');
    if (managementTasksCache.length) renderManagementTasks(managementTasksCache, { editable: managementTasksAvailable });
  }

  async function loadManagementTasks() {
    const statusEl = document.getElementById('management-status-msg');
    const editorStatusEl = document.getElementById('task-editor-status');
    const editorMsgEl = document.getElementById('task-editor-msg');

    if (PREVIEW_MODE) {
      managementTasksMode = 'preview';
      managementTasksAvailable = false;
      managementTasksCache = [];
      renderManagementTasks(DEFAULT_MANAGEMENT_TASKS, { editable: false });
      if (statusEl) {
        statusEl.className = 'management-alert';
        statusEl.textContent = 'Vista previa local del management. Aquí ya puedes revisar la estructura; la edición compartida se activa en el sitio publicado con Supabase.';
      }
      if (editorStatusEl) {
        editorStatusEl.textContent = 'Vista previa local: este formulario muestra cómo se editará la agenda, pero no guarda cambios desde archivo local.';
      }
      if (editorMsgEl) {
        editorMsgEl.style.display = 'none';
      }
      updateTaskEditorAvailability();
      return;
    }

    const { data: tasks, error } = await sb.from('management_tasks')
      .select('id, section_key, title, detail, owner, link_url, sort_order, is_done, created_at')
      .order('sort_order', { ascending: true })
      .order('created_at', { ascending: true });

    if (error) {
      managementTasksMode = 'local';
      managementTasksAvailable = true;
      managementTasksCache = localManagementTasks();
      renderManagementTasks(managementTasksCache, { editable: true });
      if (statusEl) {
        statusEl.className = 'management-alert';
        statusEl.textContent = 'La agenda está funcionando en modo local desde este navegador. Puedes editar tareas y checks aquí mismo mientras activamos la versión compartida.';
      }
      if (editorStatusEl) {
        editorStatusEl.textContent = 'Edición local activa en este navegador. Puedes crear, editar y marcar tareas aunque la tabla compartida aún no exista.';
      }
      if (editorMsgEl) {
        editorMsgEl.style.display = 'none';
      }
      updateTaskEditorAvailability();
      return;
    }

    managementTasksMode = 'supabase';
    managementTasksAvailable = true;
    managementTasksCache = tasks || [];
    renderManagementTasks(managementTasksCache, { editable: true });
      if (statusEl) {
        statusEl.className = 'management-alert';
        statusEl.textContent = 'Agenda centralizada en Supabase. Comparte el link del dashboard publicado y cualquier cuenta admin podrá editarla en tiempo real.';
    }
    if (editorStatusEl) {
      editorStatusEl.textContent = 'Haz clic en editar en cualquier tarea para traerla aquí, o crea una nueva desde cero.';
    }
    if (editorMsgEl && editorMsgEl.classList.contains('error')) hideMsg(editorMsgEl);
    updateTaskEditorAvailability();
    setupManagementTasksSync();
  }

  function renderManagementTasks(tasks, { editable }) {
    MANAGEMENT_SECTIONS.forEach((section) => {
      const container = document.getElementById(`management-list-${section.key}`);
      if (!container) return;

      const sectionTasks = tasks
        .filter((task) => task.section_key === section.key)
        .sort((a, b) => (a.sort_order ?? 0) - (b.sort_order ?? 0));

      if (sectionTasks.length === 0) {
        container.innerHTML = '<p class="task-empty">No hay tareas cargadas todavía para esta sección.</p>';
        return;
      }

      container.innerHTML = sectionTasks.map((task) => managementTaskHTML(task, editable)).join('');
    });
  }

  function managementTaskHTML(task, editable) {
    const safeTitle = escapeHTML(task.title || 'Sin título');
    const safeOwner = task.owner ? escapeHTML(task.owner) : '';
    const safeDetail = task.detail ? escapeHTML(task.detail) : '';
    const linkUrl = normalizeOptionalUrl(task.link_url);
    const followupHTML = shouldShowFollowupContacts(task)
      ? paidFollowupListHTML(getFollowupPaidUsers())
      : '';
    const linkHTML = linkUrl
      ? `<a class="task-link" href="${escapeAttribute(linkUrl)}" target="${linkUrl.startsWith('#') ? '_self' : '_blank'}" rel="noopener noreferrer">Abrir enlace</a>`
      : '';

    return `
      <div class="task-item ${task.is_done ? 'is-done' : ''}">
        <div class="task-topline">
          <div class="task-copy">
            <div class="task-title">${safeTitle}</div>
            ${safeDetail ? `<div class="task-detail">${safeDetail}</div>` : ''}
          </div>
          <div class="task-meta">
            ${safeOwner ? `<span class="task-chip">${safeOwner}</span>` : ''}
            <label class="task-status">
              <input class="task-check" type="checkbox" ${task.is_done ? 'checked' : ''} ${editable ? `onchange="toggleTaskDone(${JSON.stringify(task.id)}, this.checked)"` : 'disabled'} />
              Hecha
            </label>
          </div>
        </div>
        ${linkHTML}
        ${followupHTML}
        ${editable ? `
          <div class="task-actions">
            <button class="task-btn" onclick="toggleTaskDone(${JSON.stringify(task.id)}, ${!task.is_done})">${task.is_done ? 'Reabrir' : 'Marcar lista'}</button>
            <button class="task-btn" onclick="startEditTask(${JSON.stringify(task.id)})">Editar</button>
            <button class="task-btn danger" onclick="deleteTask(${JSON.stringify(task.id)})">Borrar</button>
          </div>` : ''}
      </div>`;
  }

  function shouldShowFollowupContacts(task) {
    const title = (task.title || '').toLowerCase();
    return task.section_key === 'seguimiento' && title.includes('seguimiento') && title.includes('pagaron');
  }

  function getFollowupPaidUsers() {
    return PREVIEW_MODE ? PREVIEW_PAID_USERS : paidUsersCache;

    return `

  function startEditTask(taskId) {
    if (!managementTasksAvailable) return;
    const task = managementTasksCache.find((item) => String(item.id) === String(taskId));
    if (!task) return;

    hideMsg(document.getElementById('task-editor-msg'));
    document.getElementById('task-id').value = String(task.id);
    document.getElementById('task-section').value = task.section_key;
    document.getElementById('task-owner').value = task.owner || '';
    document.getElementById('task-title').value = task.title || '';
    document.getElementById('task-detail').value = task.detail || '';
    document.getElementById('task-link').value = task.link_url || '';
    document.getElementById('task-order').value = String(task.sort_order ?? 10);
    document.getElementById('task-done').checked = Boolean(task.is_done);
    document.getElementById('task-editor-status').textContent = 'Editando tarea existente. Guarda cambios para compartirlos con el resto del equipo.';
    document.getElementById('task-editor-card')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  async function saveTask() {
    const msgEl = document.getElementById('task-editor-msg');
    if (!managementTasksAvailable) {
      showMsg(msgEl, 'error', 'La edición compartida requiere crear la tabla public.management_tasks.');
      return;
    }

    const taskId = document.getElementById('task-id').value;
    const payload = {
      section_key: document.getElementById('task-section').value,
      owner: emptyToNull(document.getElementById('task-owner').value),
      title: document.getElementById('task-title').value.trim(),
      detail: emptyToNull(document.getElementById('task-detail').value),
      link_url: emptyToNull(normalizeOptionalUrl(document.getElementById('task-link').value)),
      sort_order: Number(document.getElementById('task-order').value || 0),
      is_done: document.getElementById('task-done').checked
    };

    if (!payload.title) {
      showMsg(msgEl, 'error', 'Ingresa un título para la tarea.');
      return;
    }

    const saveBtn = document.getElementById('save-task-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = taskId ? 'Guardando…' : 'Creando…';
    hideMsg(msgEl);

    let error = null;
    if (managementTasksMode === 'local') {
      const localTasks = managementTasksCache.slice();
      const nextTask = sanitizeTask({
        id: taskId || `local-task-${Date.now()}`,
        ...payload
      }, localTasks.length);

      if (taskId) {
        const taskIndex = localTasks.findIndex((item) => String(item.id) === String(taskId));
        if (taskIndex >= 0) localTasks[taskIndex] = nextTask;
      } else {
        localTasks.push(nextTask);
      }

      managementTasksCache = localTasks
        .map((task, index) => sanitizeTask(task, index))
        .sort((a, b) => (a.sort_order ?? 0) - (b.sort_order ?? 0));
      writeLocalManagementTasks(managementTasksCache);
    } else if (taskId) {
      ({ error } = await sb.from('management_tasks').update(payload).eq('id', taskId));
    } else {
      ({ error } = await sb.from('management_tasks').insert({
        ...payload,
        created_by: currentUser.id
      }));
    }

    if (error) {
      showMsg(msgEl, 'error', 'No se pudo guardar la tarea: ' + error.message);
    } else {
      showMsg(msgEl, 'success', taskId ? 'Tarea actualizada.' : 'Tarea creada.');
      resetTaskForm();
      if (managementTasksMode === 'local') {
        renderManagementTasks(managementTasksCache, { editable: true });
      } else {
        loadManagementTasks();
      }
    }

    saveBtn.disabled = false;
    saveBtn.textContent = 'Guardar tarea';
  }

  async function toggleTaskDone(taskId, nextDone) {
    if (!managementTasksAvailable) return;
    if (managementTasksMode === 'local') {
      managementTasksCache = managementTasksCache.map((task) => (
        String(task.id) === String(taskId)
          ? { ...task, is_done: nextDone }
          : task
      ));
      writeLocalManagementTasks(managementTasksCache);
      renderManagementTasks(managementTasksCache, { editable: true });
      return;
    }

    const { error } = await sb.from('management_tasks')
      .update({ is_done: nextDone })
      .eq('id', taskId);

    if (error) {
      alert('Error al actualizar la tarea: ' + error.message);
      return;
    }

    loadManagementTasks();
  }

  async function deleteTask(taskId) {
    if (!managementTasksAvailable) return;
    const confirmed = window.confirm('¿Borrar esta tarea del dashboard?');
    if (!confirmed) return;

    if (managementTasksMode === 'local') {
      managementTasksCache = managementTasksCache.filter((task) => String(task.id) !== String(taskId));
      writeLocalManagementTasks(managementTasksCache);
      if (String(document.getElementById('task-id').value) === String(taskId)) resetTaskForm();
      renderManagementTasks(managementTasksCache, { editable: true });
      return;
    }

    const { error } = await sb.from('management_tasks')
      .delete()
      .eq('id', taskId);

    if (error) {
      alert('Error al borrar la tarea: ' + error.message);
      return;
    }

    if (String(document.getElementById('task-id').value) === String(taskId)) resetTaskForm();
    loadManagementTasks();
  }

  function setupManagementTasksSync() {
    if (managementChannel || !managementTasksAvailable) return;

    managementChannel = sb.channel('dashboard-management-sync')
      .on(
        'postgres_changes',
        { event: '*', schema: 'public', table: 'management_tasks' },
        () => {
          loadManagementTasks();
        }
      )
      .subscribe();
  }

                ${fallbackMembers.map(u => `
                  <tr>
                    <td class="email-cell" title="${u.email}">${u.email}</td>
                    <td><span class="paid-badge ${u.is_paid ? 'yes' : 'no'}">${u.is_paid ? 'Sí' : 'No'}</span></td>
                    <td><button class="toggle-paid-btn" disabled title="Se activará cuando la base responda">Dar acceso</button></td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
      return;
    }

    const adminUsers = users.filter((user) => user.is_admin || isManagementAdminEmail(user.email));
    const memberUsers = users.filter((user) => !user.is_admin && !isManagementAdminEmail(user.email));

    wrap.innerHTML = `
      <div style="display:grid;gap:18px;">
        <div>
          <p style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);margin:0 0 10px;">Admins</p>
          <table class="users-table">
            <thead>
              <tr><th>Correo</th><th>Rol</th><th></th></tr>
            </thead>
            <tbody>
              ${adminUsers.map(u => `
                <tr id="admin-row-${u.id}">
                  <td class="email-cell" title="${u.email}">${u.email}</td>
                  <td><span class="paid-badge yes">Admin</span></td>
                  <td>${u.id === currentUser.id ? '<span style="font-size:.7rem;color:rgba(255,255,255,.3)">Tú</span>' : '<span style="font-size:.7rem;color:rgba(255,255,255,.3)">Puede editar management</span>'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div>
          <p style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);margin:0 0 10px;">Usuarios del servicio</p>
          <table class="users-table">
            <thead>
              <tr><th>Correo</th><th>Acceso</th><th></th></tr>
            </thead>
            <tbody>
              ${memberUsers.map(u => `
                <tr id="user-row-${u.id}">
                  <td class="email-cell" title="${u.email}">${u.email}</td>
                  <td><span class="paid-badge ${u.is_paid ? 'yes' : 'no'}">${u.is_paid ? 'Sí' : 'No'}</span></td>
                  <td>
                    <button class="toggle-paid-btn" onclick="togglePaid('${u.id}', ${u.is_paid})">
                      ${u.is_paid ? 'Quitar acceso' : 'Dar acceso'}
                    </button>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  async function togglePaid(userId, currentPaid) {
    if (PREVIEW_MODE) {
      alert('Vista previa local: este cambio solo funciona en el sitio publicado con sesión.');
      return;
    }

    const { error } = await sb.from('profiles')
      .update({ is_paid: !currentPaid })
      .eq('id', userId);

    if (error) { alert('Error al actualizar: ' + error.message); return; }
    loadUsers();
    loadPaidUsers();
  }

  function setupProfilesSync() {
    if (profilesChannel) return;

    profilesChannel = sb.channel('dashboard-profiles-sync')
      .on(
        'postgres_changes',
        { event: '*', schema: 'public', table: 'profiles' },
        () => {
          loadUsers();
          loadPaidUsers();
        }
      )
      .subscribe();

    if (!paidUsersRefreshHandle) {
      paidUsersRefreshHandle = window.setInterval(() => {
        loadPaidUsers();
      }, 60000);
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────
  function escapeHTML(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function escapeAttribute(value) {
    return escapeHTML(value);
  }

  function emptyToNull(value) {
    if (value == null) return null;
    const trimmed = String(value).trim();
    return trimmed ? trimmed : null;
  }

  function normalizeOptionalUrl(value) {
    const cleaned = emptyToNull(value);
    if (!cleaned) return null;
    if (cleaned.startsWith('#')) return cleaned;
    if (/^https?:\/\//i.test(cleaned)) return cleaned;
    return `https://${cleaned}`;
  }

  function showMsg(el, type, msg) {
    el.className = `msg ${type}`; el.textContent = msg; el.style.display = 'block';
  }
  function hideMsg(el) { el.style.display = 'none'; }

  // ── Start ─────────────────────────────────────────────────────────────
  if (!window.__dashboardPreviewRendered) init();
</script>

</body>
